<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Habit Breaker</title>

<style>
:root{
  --bg:#05060a;
  --panel:#121521;
  --panel2:#0e111a;
  --text:#e9e9ee;
  --muted:#9aa0ad;
  --border:#252a3a;

  --hot:#ff4d4d;
  --mid1:#ff8a3d;
  --mid2:#ffd166;
  --mid3:#4cc9f0;
  --cool:#4cc9f0;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:920px;
  margin:0 auto;
  padding:20px 16px 48px;
  display:flex;
  flex-direction:column;
  gap:14px; /* issue 1: tighter */
}

.card{
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px; /* issue 1: reduced from 24px */
  box-shadow:0 18px 40px rgba(0,0,0,0.35);
  transition:box-shadow .4s, transform .4s;
}

h2{
  margin:0 0 4px;
  font-size:19px;
  font-weight:700;
}

.subtitle{
  font-size:13px;
  color:var(--muted);
  margin-bottom:8px;
}

button{
  border:0;
  border-radius:12px;
  padding:0 14px;
  cursor:pointer;
  font-weight:600;
  color:#fff;
  height:48px;
  font-family:inherit;
  font-size:14px;
}

.primary{background:#8b6cff}
.danger{background:#ff4d4d}

button:disabled{opacity:.5;cursor:not-allowed}

input{
  flex:1;
  height:48px;
  padding:0 12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  font-family:inherit;
  font-size:14px;
}
/* issue 3: removed text-transform:uppercase */

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

/* --- issue 6: filled circle buttons --- */
.btn-circle{
  width:48px;
  height:48px;
  border-radius:50%;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:700;
  background:#8b6cff;
  color:#fff;
  flex-shrink:0;
  padding:0;
  line-height:1;
}

/* --- pills --- */
.pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid var(--border);
  font-size:12px;
  font-weight:500;
  color:var(--muted);
  cursor:pointer;
}
.pill.active{
  border-color:#8b6cff;
  color:var(--text);
  background:rgba(139,108,255,.12);
}
.pill-del{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;
  height:18px;
  border-radius:50%;
  background:rgba(255,77,77,.25);  /* issue 4 + issue 6: filled */
  color:#ff4d4d;
  font-size:13px;
  font-weight:700;
  line-height:1;
  cursor:pointer;
  transition:background .15s;
  flex-shrink:0;
}
.pill-del:hover{
  background:rgba(255,77,77,.5);
}

/* --- progress --- */
.meta{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
  margin-top:6px;  /* issue 1: reduced */
}

.bar{
  position:relative;
  height:16px;
  border-radius:999px;
  overflow:hidden;
  border:1px solid var(--border);
  margin-top:8px;  /* issue 1: reduced */
  background:#151a28;
}

.fill{
  height:100%;
  width:0%;
  background:var(--hot);
  transition:width .2s linear, background .3s linear, box-shadow .3s linear;
}

.ring{
  position:absolute;
  inset:0;
  border-radius:999px;
  pointer-events:none;
}

.ring.active{
  animation:ring 1s ease-out forwards;
  border:2px solid #4cc9f0;
}

@keyframes ring{
  0%{transform:scale(1);opacity:0.8}
  100%{transform:scale(1.4);opacity:0}
}

/* --- motivational message: close to bar (issue 1) --- */
#msg{
  margin-top:4px;
  font-size:12px;
  min-height:16px;
}

/* --- success: issue 7 --- */
@keyframes pulseBlue{
  0%{box-shadow:0 0 0 rgba(76,201,240,0)}
  40%{box-shadow:0 0 30px rgba(76,201,240,.6)}
  100%{box-shadow:0 0 0 rgba(76,201,240,0)}
}

.achieve{
  animation:pulseBlue 1.2s ease-out;
}

.achText{
  margin-top:8px;
  font-size:13px;
  font-weight:700;
  color:#4cc9f0;
  text-align:center;
  opacity:0;
  transition:opacity .6s;
}

.achText.show{
  opacity:1;
}

/* --- log entry appear animation (issue 7) --- */
@keyframes logEntry{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}

/* --- log --- */
.logItem{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border:1px solid var(--border);
  border-radius:12px;
  margin-top:6px;
  font-size:12px;
  animation:logEntry .3s ease-out; /* issue 7: appear */
}

.minus{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,77,77,.2);  /* issue 6: filled */
  color:#ff4d4d;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  border:none;  /* issue 6: no outline */
  transition:background .15s;
  flex-shrink:0;
}
.minus:hover{
  background:rgba(255,77,77,.4);
}

/* --- session card: no jump --- */
.session-card{
  min-height:0;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <h2>Habit Breaker</h2>
    <div class="subtitle">Delay urges. Build control.</div>
  </div>

  <div class="card session-card">
    <!-- issue 2: same button swaps text/style -->
    <button id="urgeBtn" class="primary" style="width:100%">I WANT SWEETS</button>

    <div id="active" class="hidden">

      <div class="meta">
        <div>Session</div>
        <div><span id="sec">0</span>s / 300s</div>
      </div>

      <div class="bar" id="bar">
        <div class="fill" id="fill"></div>
        <div class="ring" id="ring"></div>
      </div>

      <!-- issue 1: msg close to bar -->
      <div class="meta" id="msg"></div>

      <!-- issue 7: success message -->
      <div class="achText" id="ach">YOU DID IT</div>

    </div>
  </div>

  <div class="card">
    <h2>Trigger</h2>

    <div class="row">
      <!-- issue 3: placeholder sentence case -->
      <input id="reasonInput" placeholder="Add trigger"/>
      <!-- issue 6: circle filled + -->
      <button class="btn-circle" id="addReason">+</button>
    </div>

    <div class="row" id="reasons"></div>
  </div>

  <div class="card">
    <h2>Today Log</h2>
    <div id="stats" class="meta"></div>
    <div id="log"></div>
  </div>

</div>

<script>
const KEY="hb_final";
let state=JSON.parse(localStorage.getItem(KEY)||JSON.stringify({
  cravings:[],
  reasons:[]
}));

let active=null;
let t=null;
let sec=0;
const MAX=300;

function today(){
  return new Date().toISOString().slice(0,10);
}

function save(){
  localStorage.setItem(KEY,JSON.stringify(state));
  render();
}

function lerpC(a,b,t){
  const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
  const ar=(ah>>16)&0xff,ag=(ah>>8)&0xff,ab=ah&0xff;
  const br=(bh>>16)&0xff,bg=(bh>>8)&0xff,bb=bh&0xff;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

function color(p){
  const stops=[{p:0,c:'#ff4d4d'},{p:.25,c:'#ff8a3d'},{p:.5,c:'#ffd166'},{p:.75,c:'#4cc9f0'},{p:1,c:'#4cc9f0'}];
  for(let i=0;i<stops.length-1;i++){
    if(p>=stops[i].p*100&&p<=stops[i+1].p*100){
      const t=(p-stops[i].p*100)/((stops[i+1].p-stops[i].p)*100);
      return lerpC(stops[i].c,stops[i+1].c,t);
    }
  }
  return '#4cc9f0';
}

function msg(p){
  const m=document.getElementById("msg");
  if(p<5) m.innerText="Not today.";
  else if(p<15) m.innerText="Keep the streak alive.";
  else if(p<30) m.innerText="Every second counts.";
  else if(p<55) m.innerText="You're winning this one.";
  else m.innerText="Finish what you started.";
}

function start(){
  if(t) clearInterval(t);
  active={ts:Date.now(), reasons:[]};
  sec=0;

  document.getElementById("active").classList.remove("hidden");

  // issue 2: swap button text + style
  const btn=document.getElementById("urgeBtn");
  btn.innerText="I GAVE IN";
  btn.className="danger";
  btn.disabled=false;

  // issue 5: stable timer — 500ms, compare Date.now()
  t=setInterval(tick,500);
}

function tick(){
  if(!active) return;  // guard: finish() may have cleared active
  // issue 5: compute from start time, not counter
  const elapsed=Math.floor((Date.now()-active.ts)/1000);
  sec=elapsed;

  document.getElementById("sec").innerText=sec;

  const p=(sec/MAX)*100;
  const fill=document.getElementById("fill");

  fill.style.width=Math.min(100,p)+"%";
  fill.style.background=color(p);

  // issue 8: glow intensity starts hot, cools to nothing at 99%
  const glowIntensity=Math.max(0,1-p/99);  // 1 at 0%, 0 at 99%
  const blur=2+glowIntensity*30;           // 32px at start, 2px at 99%
  fill.style.boxShadow=`0 0 ${blur}px ${color(p)}`;

  msg(p);

  if(sec>=MAX){
    complete();
  }
}

function complete(){
  clearInterval(t);

  // issue 8: clear glow (success handles its own)
  document.getElementById("fill").style.boxShadow='none';

  const bar=document.getElementById("bar");
  const ring=document.getElementById("ring");

  bar.classList.add("achieve");  // issue 7: cold blue pulse
  ring.classList.add("active");

  // issue 7: success message
  const ach=document.getElementById("ach");
  ach.classList.add("show");

  // issue 8: fill cold blue at 100% (already handled by color(p))

  setTimeout(()=>{
    finish("resisted");
  },1200);
}

function finish(result){
  if(t){ clearInterval(t); t=null; }
  if(!active) return;  // idempotent: already finished

  state.cravings.push({
    ts:active.ts,
    day:today(),
    sec,
    result,
    reasons:active.reasons
  });

  active=null;
  sec=0;

  document.getElementById("active").classList.add("hidden");

  // issue 2: revert button
  const btn=document.getElementById("urgeBtn");
  btn.innerText="I WANT SWEETS";
  btn.className="primary";

  document.getElementById("fill").style.width="0%";
  document.getElementById("fill").style.boxShadow='none';
  document.getElementById("ach").classList.remove("show");
  document.getElementById("bar").classList.remove("achieve");
  document.getElementById("ring").classList.remove("active");

  save();
}

// issue 2: single button handles both start and give-in
document.getElementById("urgeBtn").onclick=function(){
  if(active){
    // currently in session — give in
    finish("consumed");
  } else {
    start();
  }
};

document.getElementById("addReason").onclick=()=>{
  const inp=document.getElementById("reasonInput");
  const raw=inp.value;
  const v=raw.trim().toUpperCase();  // normalized: trimmed uppercase
  if(!v)return;

  // case-insensitive set: if new, add to state
  if(!state.reasons.includes(v)) state.reasons.push(v);

  // submitting always activates in current session (if active)
  if(active && !active.reasons.includes(v)) active.reasons.push(v);

  inp.value="";
  save();
};

function renderReasons(){
  const el=document.getElementById("reasons");
  el.innerHTML="";

  state.reasons.forEach(r=>{
    const d=document.createElement("div");
    d.className="pill"+(active && active.reasons.includes(r)?" active":"");

    const text=document.createElement("span");
    text.innerText=r;
    d.appendChild(text);

    // issue 4: delete button on each trigger
    const del=document.createElement("span");
    del.className="pill-del";
    del.innerText="×";
    del.onclick=(e)=>{
      e.stopPropagation();
      const idx=state.reasons.indexOf(r);
      if(idx>-1) state.reasons.splice(idx,1);
      if(active) active.reasons=active.reasons.filter(x=>x!==r);
      save();
    };
    d.appendChild(del);

    d.onclick=()=>{
      if(!active)return;
      active.reasons=active.reasons.includes(r)
        ? active.reasons.filter(x=>x!==r)
        : [...active.reasons,r];
      render();
    };

    el.appendChild(d);
  });
}

function renderStats(){
  const d=state.cravings.filter(c=>c.day===today());
  const total=d.length;
  const res=d.filter(x=>x.result==="resisted").length;
  const fail=total-res;

  document.getElementById("stats").innerText=
    `Total ${total} • Resisted ${res} • Consumed ${fail}`;
}

function renderLog(){
  const el=document.getElementById("log");
  el.innerHTML="";

  const todayEntries=state.cravings.filter(c=>c.day===today()).slice().reverse();

  todayEntries.forEach((c,i)=>{
    const row=document.createElement("div");
    row.className="logItem";

    const left=document.createElement("div");
    left.innerText=`${c.sec}s • ${c.result.toUpperCase()}`;

    const delBtn=document.createElement("div");
    delBtn.className="minus";
    delBtn.innerText="−";

    delBtn.onclick=()=>{
      const idx=state.cravings.indexOf(c);
      if(idx>-1) state.cravings.splice(idx,1);
      save();
    };

    row.appendChild(left);
    row.appendChild(delBtn);
    el.appendChild(row);
  });
}

function render(){
  renderReasons();
  renderStats();
  renderLog();
}

render();
</script>

</body>
</html>
